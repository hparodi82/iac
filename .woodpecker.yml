# add daemon_off: true
git add .woodpecker.yml
git commit -m "Fix docker-build: use host socket, add registry"
git pushsteps:
  build:
    image: hugomods/hugo:exts-non-root
    commands:
      - npm install
      - hugo --minify
    when:
      event: [push, manual]
      branch: main

  docker-build:
    image: woodpeckerci/plugin-docker-buildx
    when:
      event: [push, manual]
      branch: main
    settings:
      repo: 192.168.30.11:5000/hugo-site
      tags: latest
      insecure: true
      daemon_off: true
