steps:
  build:
    image: hugomods/hugo:exts-non-root
    commands:
      - npm install
      - hugo --minify
    when:
      event: [push, manual]
      branch: main

  docker-build:
    image: woodpeckerci/plugin-docker-buildx
    when:
      event: [push, manual]
      branch: main
    settings:
      repo: 192.168.30.11:8443/hugo-site/hugo-site
      registry: https://192.168.30.11:8443
      tags: latest
      username:
        from_secret: harbor_username
      password:
        from_secret: harbor_password