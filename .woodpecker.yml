steps:
  build:
    image: hugomods/hugo:exts-non-root
    commands:
      - npm install
      - hugo --minify
    when:
      event: [push, manual]
      branch: main

  docker-build:
    image: woodpeckerci/plugin-docker-buildx
    when:
      event: [push, manual]
      branch: main
    settings:
      repo: 192.168.30.11:8080/hugo-site/hugo-site
      registry: 192.168.30.11:8080
      tags: latest
      insecure: true
      username:
        from_secret: harbor_username
      password:
        from_secret: harbor_password