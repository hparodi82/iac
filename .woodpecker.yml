steps:
  - name: build
    image: hugomods/hugo:exts-non-root
    commands:
      - npm install
      - hugo --minify
    when:
      - event: [push, manual]
        branch: main

  - name: docker-build
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: 192.168.30.11:5000/hugo-site
      tags: latest
      insecure: true
      daemon_off: true
    when:
      - event: [push, manual]
        branch: main
